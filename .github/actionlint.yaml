# actionlint configuration file
# This file provides metadata for custom or third-party actions that are not correctly summarized in the default schema.
# More info: https://github.com/rhysd/actionlint/blob/main/docs/usage.md#configuration

action-overrides:
  "treosh/lighthouse-ci-action@.*":
    outputs:
      manifest:
        description: "JSON string containing the Lighthouse CI manifest"
      links:
        description: "JSON string containing the audit report links"
      assertionResults:
        description: "JSON string containing the Lighthouse CI assertion results"
      resultsPath:
        description: "Path to the Lighthouse CI results directory"
